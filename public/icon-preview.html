<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sidebar Icon Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; padding: 32px; color: #111; }
  h2 { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #999; margin: 24px 0 10px; }
  h2:first-child { margin-top: 0; }
  .grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .item {
    display: flex; align-items: center; gap: 10px;
    background: white; border: 1px solid #e5e5e5; border-radius: 10px;
    padding: 8px 12px; min-width: 160px;
  }
  .icon-wrap {
    display: flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 6px;
    border: 1px solid #e5e5e5; background: white; color: #9ca3af; flex-shrink: 0;
  }
  .label { font-size: 12px; font-weight: 500; color: #374151; }
  hr { border: none; border-top: 1px solid #e5e5e5; margin: 24px 0; }
</style>
</head>
<body>
